<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Example</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Information Table</h1>
    <table>
        <thead>
            <tr>
                <th>Phone</th>
                <th>Gender</th>
                <th>Address</th>
                <th>Vehicle</th>
                <th>Vehicle No</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>123-456-7890</td>
                <td>Male</td>
                <td>123 Main Street</td>
                <td>Car</td>
                <td>KA-01-1234</td>
            </tr>
            <tr>
                <td>987-654-3210</td>
                <td>Female</td>
                <td>456 Elm Street</td>
                <td>Bike</td>
                <td>KA-02-5678</td>
            </tr>
            <tr>
                <td>555-555-5555</td>
                <td>Other</td>
                <td>789 Pine Avenue</td>
                <td>Truck</td>
                <td>KA-03-9101</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
